<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>랜덤 문장</title>
  <style>
    body {
      font-family: 'Apple SD Gothic Neo', sans-serif;
      text-align: center;
      padding: 40px;
      background-color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    button {
      margin: 20px auto;
      padding: 12px 24px;
      font-size: 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #f0f0f0;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #ddd;
    }
    #sentence {
      margin-top: 40px;
      font-size: 1.6rem;
      color: #333;
      opacity: 0;
      transition: opacity 1s ease-in;
    }
    .links {
      margin-top: 30px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .links a {
      font-size: 1.1rem;
      color: #007acc;
      text-decoration: none;
    }
    .links a:hover {
      text-decoration: underline;
    }
    footer {
      margin-top: auto;
      font-size: 0.9rem;
      color: #aaa;
      padding-top: 60px;
    }
  </style>
</head>
<body>

  <button onclick="showRandomSentence()">문장 보기</button>

  <div id="sentence">👇 버튼을 눌러 문장을 확인하세요</div
